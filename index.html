function slugify(text) {
  return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
}

const inputStyle = {
  width: "100%", padding: "12px 14px", borderRadius: 10,
  border: "1px solid var(--border)", background: "var(--bg3)",
  color: "var(--text)", fontFamily: "'Outfit', sans-serif", fontSize: 14,
  outline: "none", marginBottom: 14, boxSizing: "border-box", transition: "border-color 0.15s"
};

function Label({ children }) {
  return <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "var(--text2)", marginBottom: 6 }}>{children}</label>;
}

function exportXLS(candidates, companyName) {
  if (!window.XLSX) return alert("Biblioteca XLSX carregando, tente novamente.");
  const data = candidates.map(c => ({ "Nome": c.name, "Email": c.email, "Telefone": c.phone || "", "Cargo": c.role, "Status": c.status }));
  const worksheet = XLSX.utils.json_to_sheet(data);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Candidatos");
  XLSX.writeFile(workbook, `candidatos_${companyName.replace(/\s+/g,"-").toLowerCase()}.xlsx`);
}

function exportPDF(candidates, companyName) {
  if (!window.jspdf) return alert("Biblioteca jsPDF carregando, tente novamente.");
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text(`Candidatos - ${companyName}`, 14, 15);
  const tableColumn = ["Nome", "Email", "Cargo", "Status"];
  const tableRows = candidates.map(c => [c.name, c.email, c.role, c.status]);
  doc.autoTable({ head: [tableColumn], body: tableRows, startY: 20 });
  doc.save(`candidatos_${companyName.replace(/\s+/g,"-").toLowerCase()}.pdf`);
}

// ─── MAIN APP ───────────────────────────────────────────────────────────────
function App() {
  const [state, setState] = useState({
    theme: "dark",
    view: "landing",
    currentUser: null,
    currentCompany: null,
    loading: true
  });
  
  const [dashSection, setDashSection] = useState("dashboard");
  const [publicSlug, setPublicSlug] = useState("techcorp-brasil");
  const [notification, setNotification] = useState(null);
  
  const [companiesData, setCompaniesData] = useState([]);

  // Check hash on load for public page routing
  useEffect(() => {
    const hash = window.location.hash;
    if (hash && hash.startsWith('#/empresa/')) {
      const slug = hash.replace('#/empresa/', '');
      if (slug) {
        setPublicSlug(slug);
        setState(s => ({ ...s, view: 'public-company', loading: false }));
        return;
      }
    }
    const fetchSession = async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        await fetchUserData(session.user);
      } else {
        setState(s => ({ ...s, loading: false }));
      }
    };
    fetchSession();
  }, []);

  const fetchUserData = async (user) => {
    // Buscar perfil do banco
    const { data: profile } = await supabase.from('users').select('*').eq('id', user.id).single();
    if (!profile) {
      // Usuário autenticou, mas o perfil não foi criado (registro incompleto).
      // Direcionamos ele para concluir o cadastro da empresa.
      setState(s => ({ ...s, currentUser: null, view: 'register-company', loading: false }));
      return;
    }
    
    // Buscar empresa
    const { data: company } = await supabase.from('companies').select('*, jobs(*), candidates(*, candidate_notes(*)), users(*)').eq('id', profile.company_id).single();
    
    // Calcular se a conta está ativa (assinatura ou trial)
    const now = new Date();
    const trialDate = company?.trial_ends_at ? new Date(company.trial_ends_at) : now;
    const isTrialing = (company?.subscription_status === 'trialing' || !company?.subscription_status) && trialDate > now;
    const isActive = company?.subscription_status === 'active';
    const isRestricted = !isActive && !isTrialing;

    setState(s => ({
      ...s,
      currentUser: profile,
      currentCompany: company || null,
      view: profile.role === "SuperAdmin" ? "super-admin" : "dashboard",
      loading: false,
      isRestricted
    }));
      
    if (company) {
      setCompaniesData([company]);
    }
  };

  const notify = (msg, type = "success") => {
    setNotification({ msg, type });
    setTimeout(() => setNotification(null), 3500);
  };

  const updateState = (updates) => setState(s => ({ ...s, ...updates }));

  const login = async (email, password) => {
    setState(s => ({ ...s, loading: true }));
    
    // 1. Tenta fazer o Login
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      if (error.message.includes("Invalid login credentials") || error.message.includes("invalid claim")) {
        // 2. Se falhar, assume que é um usuário novo e tenta Registrar!
        const { data: signUpData, error: signUpError } = await supabase.auth.signUp({ email, password });
        if (signUpError) {
           notify("Erro ao criar conta: " + signUpError.message, "error");
           setState(s => ({ ...s, loading: false }));
           return;
        }
        // Registrou com sucesso, segue o fluxo para verificar dados e ir pra tela 2
        await fetchUserData(signUpData.user);
        return;
      }
      
      notify(error.message, "error");
      setState(s => ({ ...s, loading: false }));
      return;
    }
    
    // Logou com sucesso, puxa os dados!
    await fetchUserData(data.user);
    notify(`Bem-vindo!`);
  };

  const logout = async () => {
    await supabase.auth.signOut();
    setState(s => ({ ...s, currentUser: null, currentCompany: null, view: "landing" }));
  };

  const isDark = state.theme === "dark";
  const cssVars = isDark ? {
    "--bg": "#0a0a0f", "--bg2": "#111118", "--bg3": "#1a1a24",
    "--card": "#16161f", "--border": "#2a2a38", "--text": "#e8e8f0",
    "--text2": "#9090a8", "--accent": "#7c3aed", "--accent2": "#a855f7",
    "--accent3": "#c084fc", "--success": "#10b981", "--danger": "#ef4444", "--warning": "#f59e0b",
  } : {
    "--bg": "#f0eff8", "--bg2": "#e8e7f2", "--bg3": "#ffffff",
    "--card": "#ffffff", "--border": "#dddcf0", "--text": "#1a1a2e",
    "--text2": "#5a5a7a", "--accent": "#7c3aed", "--accent2": "#7c3aed",
    "--accent3": "#7c3aed", "--success": "#059669", "--danger": "#dc2626", "--warning": "#d97706",
  };

  if (state.loading) return <div style={{ ...cssVars, minHeight: "100vh", background: "var(--bg)", display: "flex", justifyContent: "center", alignItems: "center", color: "var(--text)" }}>Carregando...</div>;

  return (
    <div style={{ ...cssVars, minHeight: "100vh", background: "var(--bg)", color: "var(--text)", fontFamily: "'Outfit', sans-serif", transition: "background 0.3s, color 0.3s" }}>
      <style>{`
        *{box-sizing:border-box}body{margin:0}
        .btn-primary{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;border-radius:12px;padding:10px 22px;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;transition:all 0.2s;letter-spacing:.2px}
        .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,58,237,0.4)}
        .card-hover{transition:transform 0.2s,box-shadow 0.2s}
        .card-hover:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,0.2)}
        input:focus,select:focus,textarea:focus{border-color:#7c3aed!important;outline:none}
        @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
        .table-row:hover{background:var(--bg3)!important}
        .kanban-card{cursor:grab}.kanban-card:active{cursor:grabbing}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-thumb{background:rgba(124,58,237,0.3);border-radius:4px}
        textarea{font-family:'Outfit',sans-serif}
        .nav-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:8px 18px;color:var(--text);cursor:pointer;font-family:'Outfit',sans-serif;font-weight:500;transition:all 0.15s}
        .nav-btn:hover{background:var(--bg3)}
        select option{background:var(--bg3);color:var(--text)}
        @media (max-width: 640px) {
          .nav-btn, .btn-primary { width: 100%; padding: 12px !important; }
          .hero-cta-container { flex-direction: column; width: 100%; }
          .hero-cta-container button { width: 100%; }
          nav { padding: 10px 16px !important; height: auto !important; flex-wrap: wrap; justify-content: center !important; gap: 10px; }
          .nav-actions { width: 100%; justify-content: center; }
        }
      `}</style>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

      {notification && (
        <div style={{ position: "fixed", top: 20, right: 20, zIndex: 9999, padding: "13px 20px", borderRadius: 12, background: notification.type === "error" ? "var(--danger)" : "var(--success)", color: "#fff", fontWeight: 700, fontSize: 14, boxShadow: "0 8px 32px rgba(0,0,0,0.3)", animation: "slideIn 0.3s ease", display: "flex", alignItems: "center", gap: 8, maxWidth: 340 }}>
          {notification.type === "error" ? "✕" : "✓"} {notification.msg}
        </div>
      )}

      {state.view === "landing" && <LandingPage state={state} updateState={updateState} isDark={isDark} theme={state.theme} login={login} notify={notify} setPublicSlug={setPublicSlug} />}
      {state.view === "register-account" && <RegisterAccount state={state} updateState={updateState} isDark={isDark} notify={notify} />}
      {state.view === "register-company" && <RegisterCompany state={state} updateState={updateState} isDark={isDark} notify={notify} fetchUserData={fetchUserData} />}
      {state.view === "public-company" && <PublicCompanyPage state={state} updateState={updateState} isDark={isDark} slug={publicSlug} notify={notify} />}
      {state.view === "dashboard" && state.currentUser && state.currentCompany && <Dashboard state={state} updateState={updateState} isDark={isDark} theme={state.theme} logout={logout} notify={notify} section={dashSection} setSection={setDashSection} fetchUserData={() => fetchUserData(state.currentUser)} setPublicSlug={setPublicSlug} />}
    </div>
  );
}

// ─── REGISTER ACCOUNT ──────────────────────────────────────────────────────
function RegisterAccount({ updateState, isDark, notify }) {
  const [form, setForm] = useState({ email: "", password: "", confirm: "", loading: false });
  
  const handleSubmit = async (e) => {
    e.preventDefault();
    if (form.password !== form.confirm) { notify("Senhas não conferem", "error"); return; }
    setForm(f => ({ ...f, loading: true }));
    
    // Register no Supabase Auth
    const { data, error } = await supabase.auth.signUp({ email: form.email, password: form.password });
    
    if (error) {
      notify(error.message, "error");
      setForm(f => ({ ...f, loading: false }));
      return;
    }
    
    updateState({ view: "register-company" });
    notify("Conta criada! Adicione os dados da sua empresa.");
  };

  return (
    <AuthLayout isDark={isDark} title="Criar sua conta" subtitle="Passo 1 de 2" updateState={updateState}>
      <form onSubmit={handleSubmit} style={{ background: "var(--card)", padding: 32, borderRadius: 20, border: "1px solid var(--border)"}}>
        <Label>Email *</Label>
        <input type="email" placeholder="seu@email.com" value={form.email} onChange={e => setForm(f => ({ ...f, email: e.target.value }))} style={inputStyle} required />
        <Label>Senha *</Label>
        <input type="password" placeholder="Mínimo 6 caracteres" value={form.password} onChange={e => setForm(f => ({ ...f, password: e.target.value }))} style={inputStyle} required />
        <Label>Confirmar senha *</Label>
        <input type="password" placeholder="Repita a senha" value={form.confirm} onChange={e => setForm(f => ({ ...f, confirm: e.target.value }))} style={inputStyle} required />
        <button type="submit" disabled={form.loading} className="btn-primary" style={{ width: "100%", marginTop: 8, padding: "14px" }}>{form.loading ? "Processando..." : "Continuar →"}</button>
      </form>
    </AuthLayout>
  );
}

// ─── REGISTER COMPANY ──────────────────────────────────────────────────────
function RegisterCompany({ updateState, isDark, notify, fetchUserData }) {
  const [form, setForm] = useState({ name: "", city: "", loading: false });

  const handleSubmit = async (e) => {
    e.preventDefault();
    setForm(f => ({ ...f, loading: true }));
    
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return;

    // 1. Criar empresa
    const slug = slugify(form.name);
    const { data: company, error: cErr } = await supabase.from('companies').insert([{ name: form.name, city: form.city, slug, owner_id: user.id }]).select().single();
    if (cErr) {
       notify("Erro ao criar empresa: " + cErr.message, "error");
       setForm(f => ({ ...f, loading: false }));
       return;
    }

    // 2. Criar perfil na public.users
    const { error: pErr } = await supabase.from('users').insert([{ id: user.id, email: user.email, name: user.email.split("@")[0], role: "Proprietário", company_id: company.id }]);
    if (pErr) {
       notify("Erro ao gerar seu perfil na empresa: " + pErr.message, "error");
       setForm(f => ({ ...f, loading: false }));
       return;
    }

    await fetchUserData(user);
    notify(`Bem-vindo à ${form.name}!`);
  };

  return (
    <AuthLayout isDark={isDark} title="Dados da Empresa" subtitle="Passo 2 de 2" updateState={updateState}>
      <form onSubmit={handleSubmit} style={{ background: "var(--card)", padding: 32, borderRadius: 20, border: "1px solid var(--border)"}}>
        <Label>Nome da Empresa *</Label>
        <input placeholder="Sua Empresa Ltda" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} style={inputStyle} required />
        <Label>Cidade Base *</Label>
        <input placeholder="Sua Cidade" value={form.city} onChange={e => setForm(f => ({ ...f, city: e.target.value }))} style={inputStyle} required />
        <button type="submit" disabled={form.loading} className="btn-primary" style={{ width: "100%", marginTop: 8, padding: "14px" }}>{form.loading ? "Salvando..." : "Concluir →"}</button>
      </form>
    </AuthLayout>
  );
}

// ─── PUBLIC PAGE ───────────────────────────────────────────────────────────
function PublicCompanyPage({ updateState, isDark, slug, notify }) {
  const [company, setCompany] = useState(null);
  const [loading, setLoading] = useState(true);
  const [form, setForm] = useState({ name: "", email: "", phone: "", role: "", address: "", experience: "", resumeFile: null, consent: false });
  const [submitting, setSubmitting] = useState(false);

  useEffect(() => {
    const fetchCo = async () => {
      const { data } = await supabase.from('companies').select('*, jobs(*)').eq('slug', slug).eq('active', true).single();
      setCompany(data);
      setLoading(false);
    }
    fetchCo();
  }, [slug]);

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!company) return;
    if (!form.consent) { notify("Você precisa aceitar os termos de uso de dados", "error"); return; }
    
    // Verificar limite do plano (para plano Profissional)
    const { data: currentComp } = await supabase.from('companies').select('*, candidates(*)').eq('id', company.id).single();
    if (currentComp && currentComp.subscription_plan === 'Profissional' && (currentComp.candidates || []).length >= 30) {
      notify("Limite de 30 candidatos atingido para o plano Profissional. A empresa precisa atualizar o plano.", "error");
      return;
    }
    
    setSubmitting(true);
    let resumePath = null;
    
    // 1. Upload do Arquivo (PDF) se existir
    if (form.resumeFile) {
      const file = form.resumeFile;
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}_${slugify(form.name)}.${fileExt}`;
      const filePath = `resumes/${fileName}`;
      
      const { data, error: uploadError } = await supabase.storage.from('resumes').upload(fileName, file);
      if (uploadError) {
        notify("Erro ao subir PDF: " + uploadError.message, "error");
        setSubmitting(false);
        return;
      }
      resumePath = fileName;
    }

    const messagePayload = `Endereço: ${form.address}`;

    // 2. Insert do Candidato
    const { error } = await supabase.from('candidates').insert([{
      company_id: company.id, name: form.name, email: form.email, phone: form.phone, role: form.role, experience: form.experience, message: messagePayload, resume_file: resumePath
    }]);
    
    if (error) { 
      notify(error.message, "error"); 
      setSubmitting(false);
      return; 
    }
    
    notify("Recebemos o seu currículo!");
    setForm({ name: "", email: "", phone: "", role: "", address: "", experience: "", resumeFile: null, consent: false });
    setSubmitting(false);
  };

  if (loading) return <div style={{ minHeight: "100vh", display: "flex", justifyContent: "center", alignItems: "center", background: "var(--bg)", color: "var(--text)" }}>Carregando página pública...</div>;
  if (!company) return <div style={{ padding: 40, textAlign: "center", minHeight: "100vh", background: "var(--bg)", color: "var(--text)" }}>Empresa não encontrada ou inativa. <br/><br/><button className="btn-primary" onClick={() => updateState({view: 'landing'})}>Voltar ao Início</button></div>;

  const openJobs = company.jobs ? company.jobs.filter(j => j.status === "Aberta") : [];

  return (
    <div style={{ minHeight: "100vh", background: "var(--bg)", color: "var(--text)" }}>
      <nav style={{ padding: "16px clamp(16px,4vw,48px)", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between", background: "var(--bg2)", gap: 12, flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 44, height: 44, background: "linear-gradient(135deg,#7c3aed,#a855f7)", borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, color: "#fff", fontWeight: 900 }}>{company.name[0]}</div>
          <div>
            <div style={{ fontWeight: 800, fontSize: 18 }}>{company.name}</div>
            <div style={{ fontSize: 12, color: "var(--text2)" }}>{company.city}{company.state ? `, ${company.state}` : ""}</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button className="nav-btn" style={{ fontSize: 13 }} onClick={() => updateState({ view: "landing" })}>← Início</button>
        </div>
      </nav>

      <div style={{ maxWidth: 800, margin: "40px auto", padding: 20 }}>
        <h1 style={{ fontSize: 28, margin: "0 0 10px", fontWeight: 800 }}>Vagas Abertas</h1>
        <p style={{ color: "var(--text2)", marginBottom: 30 }}>Preencha o formulário abaixo para se candidatar à nossa empresa.</p>
        
        <div style={{ background: "var(--card)", padding: 32, borderRadius: 16, border: "1px solid var(--border)" }}>
           <h3 style={{ margin: "0 0 20px", fontSize: 20 }}>Enviar Candidatura</h3>
           <form onSubmit={handleSubmit}>
              <Label>Nome Completo *</Label>
              <input placeholder="Ex: João da Silva" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={inputStyle} required />
              
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                <div>
                  <Label>Email *</Label>
                  <input placeholder="joao@email.com" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} style={inputStyle} required type="email" />
                </div>
                <div>
                  <Label>Telefone / WhatsApp *</Label>
                  <input placeholder="(11) 99999-9999" value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} style={inputStyle} required />
                </div>
              </div>

              <Label>Endereço Completo</Label>
              <input placeholder="Rua, Número, Bairro, Cidade" value={form.address} onChange={e=>setForm(f=>({...f,address:e.target.value}))} style={inputStyle} />
              
              <Label>Vaga Desejada *</Label>
              {openJobs.length > 0 ? (
                <select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))} style={inputStyle} required>
                  <option value="" disabled>Selecione uma vaga...</option>
                  {openJobs.map(job => (
                    <option key={job.id} value={job.title}>{job.title}</option>
                  ))}
                  <option value="Banco de Talentos">Banco de Talentos (Sem vaga específica)</option>
                </select>
              ) : (
                <input placeholder="Ex: Desenvolvedor Front-end" value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))} style={inputStyle} required />
              )}
              
              <Label>Experiência e Habilidades</Label>
              <textarea placeholder="Fale um pouco sobre você e suas experiências anteriores..." value={form.experience} onChange={e=>setForm(f=>({...f,experience:e.target.value}))} style={{ ...inputStyle, height: 80, resize: "vertical" }}></textarea>

              <Label>Anexar Currículo (PDF, opcional)</Label>
              <input type="file" accept=".pdf,.doc,.docx" onChange={e=>setForm(f=>({...f,resumeFile:e.target.files[0]}))} style={{ ...inputStyle, padding: "10px" }} />

              <div style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 18 }}>
                <input type="checkbox" checked={form.consent} onChange={e=>setForm(f=>({...f,consent:e.target.checked}))} style={{ marginTop: 4, width: 18, height: 18, cursor: "pointer" }} id="consent" />
                <label htmlFor="consent" style={{ fontSize: 13, color: "var(--text2)", cursor: "pointer", lineHeight: 1.5 }}>
                  Autorizo o tratamento e armazenamento dos meus dados pessoais fornecidos neste formulário para fins de recrutamento e seleção, conforme a Lei Geral de Proteção de Dados (LGPD).
                </label>
              </div>

              <button type="submit" className="btn-primary" style={{ width: "100%", padding: "14px", marginTop: 0, fontSize: 16 }} disabled={submitting}>
                {submitting ? "Enviando..." : "Enviar Currículo"}
              </button>
           </form>
        </div>
      </div>
    </div>
  );
}

// ─── DASHBOARD ─────────────────────────────────────────────────────────────
function Dashboard({ state, updateState, isDark, theme, logout, notify, section, setSection, fetchUserData, setPublicSlug, exportXLS, exportPDF }) {
  const { currentUser, currentCompany: company, isRestricted } = state;
  const [sidebarOpen, setSidebarOpen] = useState(window.innerWidth > 1024);
  const [showProfile, setShowProfile] = useState(false);

  // Se estiver restrito (trial vencido ou pagamento pendente), forçar aba de planos
  useEffect(() => {
    if (isRestricted && section !== "settings") {
      setSection("settings");
    }
  }, [isRestricted, section]);

  if (!currentUser || !company) return null;

  const stats = {
    total: company.candidates?.length || 0,
    open: (company.jobs || []).filter(j => j.status === "Aberta").length,
    waiting: (company.candidates || []).filter(c => c.status === "Aguardando").length,
    hired: (company.candidates || []).filter(c => c.status === "Contratado" || c.status === "Efetivo").length,
    closed: (company.candidates || []).filter(c => c.status === "Encerrado").length,
  };

  const navItems = [
    { id: "dashboard", icon: "📊", label: "Dashboard" },
    { id: "talents", icon: "👥", label: "Banco de Talentos" },
    { id: "kanban", icon: "🗂️", label: "Kanban" },
    { id: "jobs", icon: "💼", label: "Vagas" },
    { id: "users", icon: "🔑", label: "Usuários" },
    { id: "settings", icon: "⚙️", label: "Configurações" },
  ];

  return (
    <div style={{ display: "flex", minHeight: "100vh" }}>
      <aside style={{ width: sidebarOpen ? 248 : 66, background: "var(--bg2)", borderRight: "1px solid var(--border)", display: "flex", flexDirection: "column", transition: "width 0.3s ease", overflow: "hidden", position: "fixed", top: 0, bottom: 0, left: 0, zIndex: 50, flexShrink: 0 }}>
        <div style={{ padding: "18px 14px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 10, overflow: "hidden" }}>
          <div style={{ width: 36, height: 36, minWidth: 36, background: "linear-gradient(135deg,#7c3aed,#a855f7)", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, color: "#fff", fontWeight: 900 }}>{(company.name && company.name[0]) || 'E'}</div>
          {sidebarOpen && <div style={{ overflow: "hidden" }}>
            <div style={{ fontWeight: 700, fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{company.name}</div>
            <div style={{ fontSize: 11, color: "var(--text2)" }}>{currentUser.role}</div>
          </div>}
        </div>
        <nav style={{ flex: 1, padding: "10px 7px" }}>
          {navItems.map(item => {
            const isDisabled = isRestricted && item.id !== "settings";
            const isActive = section === item.id;
            return (
              <button 
                key={item.id} 
                onClick={() => {
                  if (isDisabled) {
                    notify("Acesso Restrito: Sua conta está em atraso ou o trial expirou. Por favor, regularize na aba Plano.", "error");
                    setSection("settings");
                    return;
                  }
                  setSection(item.id);
                }} 
                style={{ 
                  width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "10px 11px", borderRadius: 9, border: "none", 
                  background: isActive ? "rgba(124,58,237,0.18)" : "transparent", 
                  color: isDisabled ? "var(--text3)" : (isActive ? "var(--accent2)" : "var(--text2)"), 
                  cursor: isDisabled ? "not-allowed" : "pointer", opacity: isDisabled ? 0.4 : 1,
                  fontFamily: "'Outfit',sans-serif", fontWeight: isActive ? 700 : 400, fontSize: 14, textAlign: "left", marginBottom: 2, transition: "all 0.15s", overflow: "hidden" 
                }}
              >
                <span style={{ fontSize: 17, minWidth: 20, textAlign: "center" }}>{item.icon}</span>
                {sidebarOpen && <span style={{ whiteSpace: "nowrap" }}>{item.label}</span>}
              </button>
            );
          })}
        </nav>
        <div style={{ padding: "10px 7px", borderTop: "1px solid var(--border)" }}>
          <button onClick={() => { setPublicSlug(company.slug); updateState({ view: "public-company" }); }} style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "10px 11px", borderRadius: 9, border: "none", background: "transparent", color: "var(--text2)", cursor: "pointer", fontFamily: "'Outfit',sans-serif", fontSize: 14, marginBottom: 2, overflow: "hidden" }}>
            <span style={{ fontSize: 17, minWidth: 20, textAlign: "center" }}>🌐</span>
            {sidebarOpen && <span style={{ whiteSpace: "nowrap" }}>Página Pública</span>}
          </button>
          <button onClick={logout} style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "10px 11px", borderRadius: 9, border: "none", background: "transparent", color: "var(--danger)", cursor: "pointer", fontFamily: "'Outfit',sans-serif", fontSize: 14, overflow: "hidden" }}>
            <span style={{ fontSize: 17, minWidth: 20, textAlign: "center" }}>🚪</span>
            {sidebarOpen && <span style={{ whiteSpace: "nowrap" }}>Sair</span>}
          </button>
        </div>
      </aside>

      <main style={{ flex: 1, marginLeft: sidebarOpen ? 248 : 66, transition: "margin-left 0.3s ease", minHeight: "100vh", display: "flex", flexDirection: "column" }}>
        <header style={{ height: 62, padding: "0 24px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid var(--border)", background: "var(--bg)", position: "sticky", top: 0, zIndex: 40 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "var(--text2)" }}>☰</button>
            <h1 style={{ margin: 0, fontSize: 17, fontWeight: 700 }}>{navItems.find(i => i.id === section)?.label || "Dashboard"}</h1>
          </div>
          <div style={{ display: "flex", gap: 10, alignItems: "center", position: "relative" }}>
            <button onClick={() => updateState({ theme: theme === "dark" ? "light" : "dark" })} style={{ background: "var(--bg3)", border: "1px solid var(--border)", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 16 }}>{isDark ? "☀️" : "🌙"}</button>
            {(company.candidates || []).filter(c => c.status === "Aguardando").length > 0 && (
              <button onClick={() => setSection("talents")} style={{ background: "rgba(245,158,11,0.15)", border: "1px solid rgba(245,158,11,0.3)", borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontSize: 13, fontWeight: 700, color: "#f59e0b", display: "flex", alignItems: "center", gap: 5, fontFamily: "inherit" }}>
                🔔 <span style={{ background: "#f59e0b", color: "#000", borderRadius: 10, padding: "1px 7px", fontSize: 11 }}>{(company.candidates || []).filter(c => c.status === "Aguardando").length}</span>
              </button>
            )}
            <button onClick={() => setShowProfile(!showProfile)} style={{ width: 34, height: 34, background: "linear-gradient(135deg,#7c3aed,#a855f7)", borderRadius: 50, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, color: "#fff", fontWeight: 700, border: "none", cursor: "pointer" }}>{(currentUser.name && currentUser.name[0]) || 'U'}</button>
            {showProfile && (
              <div style={{ position: "absolute", top: 44, right: 0, background: "var(--card)", border: "1px solid var(--border)", borderRadius: 14, padding: 8, minWidth: 220, boxShadow: "0 16px 48px rgba(0,0,0,0.3)", zIndex: 200 }} onClick={e => e.stopPropagation()}>
                <div style={{ padding: "10px 14px 12px", borderBottom: "1px solid var(--border)" }}>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{currentUser.name}</div>
                  <div style={{ fontSize: 12, color: "var(--text2)" }}>{currentUser.email}</div>
                  <span style={{ marginTop: 5, display: "inline-block", padding: "2px 9px", borderRadius: 12, fontSize: 11, fontWeight: 700, background: "rgba(124,58,237,0.15)", color: "var(--accent2)" }}>{currentUser.role}</span>
                </div>
                <div style={{ padding: "6px 0" }}>
                  <button onClick={() => { setSection("settings"); setShowProfile(false); }} style={{ width: "100%", textAlign: "left", padding: "9px 14px", background: "none", border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: 13, color: "var(--text)", borderRadius: 8, display: "flex", alignItems: "center", gap: 8 }}>⚙️ Configurações</button>
                  <button onClick={() => { setPublicSlug(company.slug); updateState({ view: "public-company" }); setShowProfile(false); }} style={{ width: "100%", textAlign: "left", padding: "9px 14px", background: "none", border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: 13, color: "var(--text)", borderRadius: 8, display: "flex", alignItems: "center", gap: 8 }}>🌐 Página Pública</button>
                  <button onClick={() => { logout(); setShowProfile(false); }} style={{ width: "100%", textAlign: "left", padding: "9px 14px", background: "none", border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: 13, color: "var(--danger)", borderRadius: 8, display: "flex", alignItems: "center", gap: 8 }}>🚪 Sair</button>
                </div>
              </div>
            )}
          </div>
        </header>

        <div style={{ padding: "24px", flex: 1 }}>
          {section === "dashboard" && <DashboardHome stats={stats} company={company} updateState={updateState} setSection={setSection} setPublicSlug={setPublicSlug} />}
          {section === "talents" && <TalentsSection company={company} fetchUserData={fetchUserData} notify={notify} currentUser={currentUser} exportXLS={exportXLS} exportPDF={exportPDF} />}
          {section === "kanban" && <KanbanSection company={company} fetchUserData={fetchUserData} notify={notify} currentUser={currentUser} />}
          {section === "jobs" && <JobsSection company={company} fetchUserData={fetchUserData} notify={notify} currentUser={currentUser} />}
          {section === "users" && <UsersSection company={company} fetchUserData={fetchUserData} notify={notify} currentUser={currentUser} />}
          {section === "settings" && <SettingsSection company={company} fetchUserData={fetchUserData} notify={notify} currentUser={currentUser} isRestricted={isRestricted} />}
        </div>
      </main>
    </div>
  );
}

function DashboardHome({ stats, company, setSection, setPublicSlug }) {
  const statusCount = {};
  const cands = company.candidates || [];
  ALL_STATUSES.forEach(s => { statusCount[s] = cands.filter(c => c.status === s).length; });
  const maxCount = Math.max(...Object.values(statusCount), 1);
  const recent = [...cands].sort((a,b) => (b.created_at||"").localeCompare(a.created_at||"")).slice(0,5);

  return (
    <div>
      <div style={{ marginBottom: 22 }}>
        <h2 style={{ margin: "0 0 4px", fontSize: 24, fontWeight: 800 }}>Olá! 👋</h2>
        <p style={{ color: "var(--text2)", margin: 0, fontSize: 14 }}>Resumo de <strong>{company.name}</strong></p>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(148px,1fr))", gap: 12, marginBottom: 18 }}>
        {[
          { label: "Candidatos", value: stats.total, icon: "👥", color: "#7c3aed", s: "talents" },
          { label: "Vagas Abertas", value: stats.open, icon: "💼", color: "#3b82f6", s: "jobs" },
          { label: "Aguardando", value: stats.waiting, icon: "⏳", color: "#f59e0b", s: "talents" },
          { label: "Contratados", value: stats.hired, icon: "✅", color: "#10b981", s: "talents" },
          { label: "Encerrados", value: stats.closed, icon: "🔒", color: "#6b7280", s: "talents" },
        ].map(c => (
          <div key={c.label} onClick={() => setSection(c.s)} className="card-hover" style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 14, padding: "16px", position: "relative", overflow: "hidden", cursor: "pointer" }}>
            <div style={{ position: "absolute", top: -6, right: -4, fontSize: 36, opacity: 0.07 }}>{c.icon}</div>
            <div style={{ fontSize: 28, fontWeight: 900, color: c.color }}>{c.value}</div>
            <div style={{ fontSize: 12, color: "var(--text2)", marginTop: 3, fontWeight: 500 }}>{c.label}</div>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(290px,1fr))", gap: 14, marginBottom: 14 }}>
        <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 14, padding: "20px 22px" }}>
          <h3 style={{ margin: "0 0 16px", fontSize: 15, fontWeight: 700 }}>Pipeline de Candidatos</h3>
          {ALL_STATUSES.map(s => {
            const count = statusCount[s];
            const pct = (count / maxCount) * 100;
            return (
              <div key={s} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                  <span style={{ color: STATUS_CONFIG[s].color, fontWeight: 600 }}>{s}</span>
                  <span style={{ color: "var(--text2)", fontWeight: 700 }}>{count}</span>
                </div>
                <div style={{ height: 8, background: "var(--bg3)", borderRadius: 6, overflow: "hidden" }}>
                  <div style={{ width: `${pct}%`, height: "100%", background: `linear-gradient(90deg,${STATUS_CONFIG[s].color},${STATUS_CONFIG[s].color}88)`, borderRadius: 6, transition: "width 0.9s cubic-bezier(.4,0,.2,1)" }} />
                </div>
              </div>
            );
          })}
        </div>

        <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 14, padding: "20px 22px" }}>
          <h3 style={{ margin: "0 0 14px", fontSize: 15, fontWeight: 700 }}>Candidaturas Recentes</h3>
          {recent.length === 0 ? (
            <div style={{ textAlign: "center", padding: "16px 0", color: "var(--text2)" }}>
              <div style={{ fontSize: 30, marginBottom: 8 }}>📭</div>
              <p style={{ fontSize: 13, margin: "0 0 12px" }}>Nenhuma candidatura ainda.</p>
            </div>
          ) : recent.map((c, i) => (
            <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 0", borderBottom: i < recent.length-1 ? "1px solid var(--border)" : "none" }}>
              <div style={{ width: 28, height: 28, background: STATUS_CONFIG[c.status].bg, borderRadius: 50, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, color: STATUS_CONFIG[c.status].color, flexShrink: 0 }}>{c.name[0]}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600, fontSize: 12, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.name}</div>
                <div style={{ fontSize: 11, color: "var(--text2)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.role}</div>
              </div>
              <div style={{ textAlign: "right", flexShrink: 0 }}>
                <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 10, background: STATUS_CONFIG[c.status].bg, color: STATUS_CONFIG[c.status].color, display: "block", marginBottom: 2 }}>{c.status}</span>
                <span style={{ fontSize: 10, color: "var(--text2)" }}>{c.created_at ? new Date(c.created_at).toLocaleDateString() : "—"}</span>
              </div>
            </div>
          ))}
          {recent.length > 0 && <button onClick={() => setSection("talents")} style={{ marginTop: 10, background: "none", border: "1px solid var(--border)", borderRadius: 8, padding: "6px 14px", cursor: "pointer", color: "var(--text2)", fontFamily: "inherit", fontSize: 12, width: "100%" }}>Ver todos →</button>}
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(260px,1fr))", gap: 14 }}>
        <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 14, padding: "18px 20px" }}>
          <h3 style={{ margin: "0 0 12px", fontSize: 15, fontWeight: 700 }}>Vagas</h3>
          {(company.jobs||[]).length === 0 ? <p style={{ color: "var(--text2)", fontSize: 13 }}>Nenhuma vaga cadastrada.</p> :
            company.jobs.slice(0,4).map(job => (
              <div key={job.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderBottom: "1px solid var(--border)" }}>
                <div style={{ fontWeight: 600, fontSize: 13, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", paddingRight: 8 }}>{job.title}</div>
                <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 9px", borderRadius: 10, background: job.status === "Aberta" ? "rgba(16,185,129,0.15)" : "rgba(107,114,128,0.15)", color: job.status === "Aberta" ? "#10b981" : "#6b7280", whiteSpace: "nowrap" }}>{job.status}</span>
              </div>
            ))}
          <button onClick={() => setSection("jobs")} style={{ marginTop: 10, background: "none", border: "1px solid var(--border)", borderRadius: 8, padding: "6px 14px", cursor: "pointer", color: "var(--text2)", fontFamily: "inherit", fontSize: 12, width: "100%" }}>Gerenciar vagas →</button>
        </div>

        <div style={{ background: "var(--card)", border: "1px solid rgba(124,58,237,0.35)", borderRadius: 14, padding: "18px 20px" }}>
          <h3 style={{ margin: "0 0 8px", fontSize: 15, fontWeight: 700 }}>🔗 Link Público</h3>
          <p style={{ color: "var(--text2)", fontSize: 13, margin: "0 0 12px", lineHeight: 1.5 }}>Compartilhe para receber candidaturas sem login.</p>
          <div style={{ background: "var(--bg3)", border: "1px solid var(--border)", borderRadius: 8, padding: "9px 12px", display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
            <code style={{ fontSize: 11, color: "var(--accent2)", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{window.location.origin + '/#/empresa/' + company.slug}</code>
            <button onClick={() => { try { navigator.clipboard.writeText(window.location.origin + '/#/empresa/' + company.slug); } catch(e){} notify && notify("Link copiado!"); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, flexShrink: 0 }} title="Copiar">📋</button>
          </div>
          <button className="btn-primary" style={{ fontSize: 13, padding: "9px 16px", width: "100%" }} onClick={() => { setPublicSlug(company.slug); updateState({ view: "public-company" }); }}>Ver Página Pública →</button>
        </div>
      </div>
    </div>
  );

// REST STUBS
function TalentsSection({ company, notify, fetchUserData, currentUser }) {
  const [filter, setFilter] = useState("Todos");
  const [search, setSearch] = useState("");
  const [viewing, setViewing] = useState(null);
  const [noteTab, setNoteTab] = useState("info"); // "info" | "notes"
  const [newNote, setNewNote] = useState("");
  const canEdit = currentUser.role !== "Visualização";

  const cands = company.candidates || [];
  const filtered = cands.filter(c => {
    const ms = filter === "Todos" || c.status === filter;
    const mq = !search || c.name.toLowerCase().includes(search.toLowerCase()) || c.role.toLowerCase().includes(search.toLowerCase()) || c.email.toLowerCase().includes(search.toLowerCase());
    return ms && mq;
  });

  const updateStatus = async (id, s) => {
    await supabase.from('candidates').update({ status: s }).eq('id', id);
    await fetchUserData();
    if (viewing?.id === id) setViewing(v => ({ ...v, status: s }));
    notify(`Status → ${s}`);
  };

  const addNote = async (candidateId) => {
    if (!newNote.trim()) return;
    const note = { candidate_id: candidateId, text: newNote.trim(), author_name: currentUser.name };
    // Create note in Supabase
    const { data: insertedNote, error } = await supabase.from('candidate_notes').insert([note]).select().single();
    if (error) { notify("Erro ao salvar anotação: " + error.message, "error"); return; }
    
    await fetchUserData();
    setViewing(v => ({ ...v, candidate_notes: [...(v.candidate_notes||[]), insertedNote] }));
    setNewNote("");
    notify("Anotação salva!");
  };

  const deleteNote = async (candidateId, noteId) => {
    await supabase.from('candidate_notes').delete().eq('id', noteId);
    await fetchUserData();
    setViewing(v => ({ ...v, candidate_notes: (v.candidate_notes||[]).filter(n => n.id !== noteId) }));

          <p style={{ color: "var(--text2)", margin: 0, fontSize: 13 }}>{cands.length} candidatos · {filtered.length} exibidos</p>
        </div>
        {canEdit && (
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => exportXLS(cands, company.name)} style={{ background: "rgba(16,185,129,0.15)", color: "#10b981", border: "1px solid rgba(16,185,129,0.3)", borderRadius: 9, padding: "8px 16px", cursor: "pointer", fontFamily: "inherit", fontSize: 13, fontWeight: 700, display: "flex", alignItems: "center", gap: 6 }}>
              📊 Exportar XLS
            </button>
            <button onClick={() => exportPDF(cands, company.name)} style={{ background: "rgba(239,68,68,0.15)", color: "#ef4444", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 9, padding: "8px 16px", cursor: "pointer", fontFamily: "inherit", fontSize: 13, fontWeight: 700, display: "flex", alignItems: "center", gap: 6 }}>

          </div>
        )}
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
        {["Todos", ...ALL_STATUSES].map(s => {
          const count = s === "Todos" ? cands.length : cands.filter(c => c.status === s).length;
          const active = filter === s;
          const cfg = STATUS_CONFIG[s];
          return (
            <button key={s} onClick={() => setFilter(s)} style={{ padding: "5px 12px", borderRadius: 20, border: `1px solid ${active ? (cfg?.color || "var(--accent2)") : "var(--border)"}`, background: active ? (cfg?.bg || "rgba(124,58,237,0.15)") : "transparent", color: active ? (cfg?.color || "var(--accent2)") : "var(--text2)", cursor: "pointer", fontFamily: "inherit", fontSize: 12, fontWeight: active ? 700 : 400, transition: "all 0.15s", display: "flex", alignItems: "center", gap: 5 }}>
              {s} <span style={{ background: active ? (cfg?.color || "var(--accent2)") : "var(--border)", color: active ? "#fff" : "var(--text2)", borderRadius: 10, padding: "1px 6px", fontSize: 10, fontWeight: 700 }}>{count}</span>
            </button>

      </div>

      <div style={{ marginBottom: 14 }}>
        <input placeholder="🔍 Buscar por nome, cargo ou email..." value={search} onChange={e => setSearch(e.target.value)} style={{ ...inputStyle, margin: 0, maxWidth: 420 }} />

function KanbanSection({ company, fetchUserData, notify, currentUser }) {
  const canEdit = currentUser.role !== "Visualização";
  const [dragging, setDragging] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const columns = ALL_STATUSES;
  const cands = company.candidates || [];

  const moveCandidate = async (candidateId, newStatus) => {
    await supabase.from('candidates').update({ status: newStatus }).eq('id', candidateId);
    await fetchUserData();
    notify(`Movido para "${newStatus}"`);
  };

  const handleDrop = (status) => {
    if (dragging && dragging !== status && canEdit) {
      moveCandidate(dragging, status);
    }
    setDragging(null);
    setDragOver(null);
  };

  return (
    <div>
      <div style={{ marginBottom: 20 }}>
        <h2 style={{ margin: "0 0 4px", fontSize: 20, fontWeight: 800 }}>Kanban Board</h2>
        <p style={{ color: "var(--text2)", margin: 0, fontSize: 13 }}>
          {canEdit ? "Arraste os candidatos entre colunas para mudar o status." : "Visualização do pipeline de candidatos."}
        </p>
      </div>

      <div style={{ display: "flex", gap: 12, overflowX: "auto", paddingBottom: 16, minHeight: 500 }}>
        {columns.map(col => {
          const colCandidates = cands.filter(c => c.status === col);
          const isOver = dragOver === col;
          return (
            <div
              key={col}
              onDragOver={e => { e.preventDefault(); setDragOver(col); }}
              onDragLeave={() => setDragOver(null)}
              onDrop={() => handleDrop(col)}
              style={{
                minWidth: 200, maxWidth: 220, flexShrink: 0,
                background: isOver ? `${STATUS_CONFIG[col].bg}` : "var(--bg2)",
                border: `2px solid ${isOver ? STATUS_CONFIG[col].color : "var(--border)"}`,
                borderRadius: 14, padding: "14px 12px",
                transition: "all 0.15s"
              }}
            >
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                  <div style={{ width: 10, height: 10, borderRadius: "50%", background: STATUS_CONFIG[col].color }} />
                  <span style={{ fontWeight: 700, fontSize: 13, color: STATUS_CONFIG[col].color }}>{col}</span>
                </div>
                <span style={{ background: STATUS_CONFIG[col].bg, color: STATUS_CONFIG[col].color, borderRadius: 10, padding: "1px 8px", fontSize: 11, fontWeight: 700 }}>{colCandidates.length}</span>
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {colCandidates.length === 0 ? (
                  <div style={{ padding: "20px 10px", textAlign: "center", color: "var(--text2)", fontSize: 12, border: "2px dashed var(--border)", borderRadius: 10 }}>
                    {isOver ? "Soltar aqui" : "Vazio"}
                  </div>
                ) : colCandidates.map(c => (
                  <div
                    key={c.id}
                    draggable={canEdit}
                    onDragStart={() => setDragging(c.id)}
                    onDragEnd={() => { setDragging(null); setDragOver(null); }}
                    style={{
                      background: "var(--card)", border: "1px solid var(--border)",
                      borderRadius: 10, padding: "12px 14px",
                      cursor: canEdit ? "grab" : "default",
                      opacity: dragging === c.id ? 0.5 : 1,
                      transition: "all 0.15s",
                      boxShadow: dragging === c.id ? "0 8px 24px rgba(0,0,0,0.3)" : "none"
                    }}
                  >
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                      <div style={{ width: 26, height: 26, background: `linear-gradient(135deg,${STATUS_CONFIG[c.status].color}44,${STATUS_CONFIG[c.status].color}22)`, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: STATUS_CONFIG[c.status].color, flexShrink: 0 }}>{c.name[0]}</div>
                      <div style={{ minWidth: 0 }}>
                        <div style={{ fontWeight: 700, fontSize: 12, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.name}</div>
                      </div>
                    </div>
                    <div style={{ fontSize: 11, color: "var(--text2)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 6 }}>{c.role}</div>
                    <div style={{ fontSize: 10, color: "var(--text2)" }}>📅 {new Date(c.created_at).toLocaleDateString()}</div>
                    {(c.candidate_notes||[]).length > 0 && (
                      <div style={{ marginTop: 6, fontSize: 10, color: "#f59e0b" }}>📝 {c.candidate_notes.length} anotaç{c.candidate_notes.length > 1 ? "ões" : "ão"}</div>
                    )}
                    {canEdit && (
                      <div style={{ marginTop: 8, display: "flex", gap: 4, flexWrap: "wrap" }}>
                        {ALL_STATUSES.filter(s => s !== c.status).slice(0, 2).map(s => (
                          <button key={s} onClick={() => moveCandidate(c.id, s)} style={{ fontSize: 10, padding: "2px 7px", borderRadius: 8, border: `1px solid ${STATUS_CONFIG[s].color}44`, background: STATUS_CONFIG[s].bg, color: STATUS_CONFIG[s].color, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>→ {s}</button>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

            <label style={{ display: "block", marginBottom: 6, fontSize: 13, fontWeight: 600, color: "var(--text2)" }}>Descrição</label>
            <textarea placeholder="Descreva a vaga..." value={form.description} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} style={{ ...inputStyle, height: 80, resize: "vertical" }} />
            <label style={{ display: "block", marginBottom: 6, fontSize: 13, fontWeight: 600, color: "var(--text2)" }}>Requisitos</label>
            <textarea placeholder="Ex: React, Node.js, SQL..." value={form.requirements} onChange={e => setForm(f => ({ ...f, requirements: e.target.value }))} style={{ ...inputStyle, height: 62, resize: "vertical" }} />
            <label style={{ display: "block", marginBottom: 6, fontSize: 13, fontWeight: 600, color: "var(--text2)" }}>Status</label>

}

function UsersSection({ company, notify, fetchUserData, currentUser }) {
  const [form, setForm] = useState(null);
  const [saving, setSaving] = useState(false);
  const isOwner = currentUser.role === "Proprietário";

  const generatePassword = () => {
    const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
    const password = Array.from({ length: 14 }, () => chars[Math.floor(Math.random() * chars.length)]).join("");
    setForm(f => ({ ...f, password }));
    notify("Senha forte gerada com sucesso!");
  };

  const saveUser = async () => {
    if (!form.name || !form.email) { notify("Nome e email obrigatórios", "error"); return; }
    
    if (!form.id && company.subscription_plan === 'Profissional' && (company.users || []).length >= 5) {
      return notify("Limite de 5 usuários atingido para o plano Profissional.", "error");
    }

    setSaving(true);
    try {
      if (form.id) {
        const { error } = await supabase.from('users').update({ name: form.name, role: form.role }).eq('id', form.id);
        if (error) { notify("Erro ao atualizar: " + error.message, "error"); setSaving(false); return; }
        notify("Usuário atualizado!");
      } else {
        if (!form.password || form.password.length < 6) { notify("Senha obrigatória (mínimo 6 caracteres)", "error"); setSaving(false); return; }
        
        const { data: { session: ownerSession } } = await supabase.auth.getSession();
        const { data: signUpData, error: signUpError } = await supabase.auth.signUp({ 
          email: form.email, 
          password: form.password 
        });
        
        if (signUpError) { 
          notify("Erro ao criar conta: " + signUpError.message, "error"); 
          setSaving(false); 
          return; 
        }
        
        const { error: profileError } = await supabase.from('users').insert([{ 
          id: signUpData.user.id, 
          email: form.email, 
          name: form.name, 
          role: form.role, 
          company_id: company.id 
        }]);
        
        if (profileError) { 
          notify("Erro ao criar perfil: " + profileError.message, "error"); 
          setSaving(false); 
          return; 
        }
        
        if (ownerSession) {
          await supabase.auth.setSession({
            access_token: ownerSession.access_token,
            refresh_token: ownerSession.refresh_token
          });
        }
        
        notify("Usuário criado com sucesso!");
      }
      await fetchUserData();
      setForm(null);
    } catch (err) {
      notify("Erro inesperado: " + err.message, "error");
    }
    setSaving(false);
  };

  const deleteUser = async (userId) => {
    if (!window.confirm("Tem certeza que deseja remover este usuário?")) return;
    const { error } = await supabase.from('users').delete().eq('id', userId);
    if (error) { notify("Erro ao remover: " + error.message, "error"); return; }
    await fetchUserData();
    notify("Usuário removido!");
  };

  const usersList = company.users || [currentUser]; 

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div>
          <h2 style={{ margin: "0 0 3px", fontSize: 20, fontWeight: 800 }}>Usuários</h2>
          <p style={{ color: "var(--text2)", margin: 0, fontSize: 13 }}>{usersList.length} com acesso</p>
        </div>
        {isOwner && <button className="btn-primary" style={{ fontSize: 13, padding: "9px 18px" }} onClick={() => setForm({ name: "", email: "", password: "", role: "RH" })}>+ Adicionar</button>}
      </div>
      <div style={{ display: "grid", gap: 10 }}>
        {usersList.map(u => (
          <div key={u.id} style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 12, padding: "16px 20px", display: "flex", alignItems: "center", gap: 14, justifyContent: "space-between", flexWrap: "wrap" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 40, height: 40, background: u.role === "Proprietário" ? "linear-gradient(135deg,#7c3aed,#a855f7)" : u.role === "RH" ? "linear-gradient(135deg,#3b82f6,#60a5fa)" : "linear-gradient(135deg,#6b7280,#9ca3af)", borderRadius: 50, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, color: "#fff", fontWeight: 700 }}>{u.name ? u.name[0] : '?'}</div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 14 }}>{u.name}</div>
                <div style={{ fontSize: 12, color: "var(--text2)" }}>{u.email}</div>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ padding: "4px 12px", borderRadius: 20, fontSize: 12, fontWeight: 700, background: u.role === "Proprietário" ? "rgba(124,58,237,0.15)" : u.role === "RH" ? "rgba(59,130,246,0.15)" : "rgba(107,114,128,0.15)", color: u.role === "Proprietário" ? "var(--accent2)" : u.role === "RH" ? "#3b82f6" : "#6b7280" }}>{u.role}</span>
              {isOwner && u.id !== currentUser.id && (
                <>
                  <button onClick={() => setForm({ ...u, password: "" })} style={{ background: "rgba(124,58,237,0.1)", color: "var(--accent2)", border: "none", borderRadius: 7, padding: "5px 11px", cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 700 }}>✏️ Editar</button>
                  <button onClick={() => deleteUser(u.id)} style={{ background: "rgba(239,68,68,0.1)", color: "var(--danger)", border: "none", borderRadius: 7, padding: "5px 11px", cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 700 }}>🗑 Remover</button>
                </>
              )}
            </div>
          </div>
        ))}
      </div>

      {form && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.72)", zIndex: 300, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }} onClick={() => setForm(null)}>
          <div style={{ background: "var(--card)", borderRadius: 20, padding: 30, width: "100%", maxWidth: 460, border: "1px solid var(--border)" }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <h2 style={{ margin: 0, fontWeight: 800, fontSize: 19 }}>{form.id ? "Editar Usuário" : "Novo Usuário"}</h2>
              <button onClick={() => setForm(null)} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", color: "var(--text2)" }}>✕</button>
            </div>
            
            {!form.id && (
              <div style={{ background: "rgba(59,130,246,0.08)", border: "1px solid rgba(59,130,246,0.2)", borderRadius: 10, padding: "12px 14px", marginBottom: 18, fontSize: 13, color: "var(--text2)", lineHeight: 1.5 }}>
                ℹ️ O novo usuário receberá email e senha para acessar o sistema com as permissões definidas.
              </div>
            )}
            
            <label style={{ display: "block", marginBottom: 6, fontSize: 13, fontWeight: 600, color: "var(--text2)" }}>Nome *</label>
            <input placeholder="Nome completo" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} style={inputStyle} />
            
            <label style={{ display: "block", marginBottom: 6, fontSize: 13, fontWeight: 600, color: "var(--text2)" }}>Email *</label>
            <input type="email" placeholder="email@empresa.com" value={form.email} onChange={e => setForm(f => ({ ...f, email: e.target.value }))} style={inputStyle} disabled={!!form.id} />
            
            {!form.id && (
              <>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: "var(--text2)" }}>Senha *</label>
                  <button onClick={generatePassword} style={{ background: "none", border: "none", color: "var(--accent2)", fontSize: 11, cursor: "pointer", fontWeight: 700, padding: 0 }}>✨ Gerar Senha Forte</button>
                </div>
                <input 
                  type="password" 
                  placeholder="Mínimo 6 caracteres" 
                  value={form.password} 
                  onChange={e => setForm(f => ({ ...f, password: e.target.value }))} 
                  style={inputStyle} 
                  autoComplete="new-password"
                />
                <div style={{ fontSize: 10, color: "var(--text2)", marginTop: -10, marginBottom: 14, fontStyle: "italic", lineHeight: 1.3 }}>
                  💡 Se o navegador alertar sobre "vazamento de dados", use o botão acima. Esse alerta acontece quando a senha já foi usada em outros sites que sofreram ataques.
                </div>
              </>
            )}
            
            <label style={{ display: "block", marginBottom: 6, fontSize: 13, fontWeight: 600, color: "var(--text2)" }}>Permissão *</label>
            <select value={form.role} onChange={e => setForm(f => ({ ...f, role: e.target.value }))} style={inputStyle}>
              <option>RH</option>
              <option>Visualização</option>
            </select>
            
            <button className="btn-primary" style={{ width: "100%", marginTop: 8, padding: "13px" }} onClick={saveUser} disabled={saving}>
              {saving ? "Processando..." : form.id ? "Salvar Alterações" : "Criar Usuário"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function SettingsSection({ company, notify, fetchUserData, currentUser, isRestricted }) {

    if (!form.name || !form.city) { notify("Nome e cidade obrigatórios", "error"); return; }
    await supabase.from('companies').update({ name: form.name, phone: form.phone, city: form.city, state: form.state }).eq('id', company.id);
    await fetchUserData();
    notify("Configurações salvas!");

    { id: "free", name: "Degustação", price: "R$ 0", color: "#6b7280", features: ["Grátis por 7 dias", "1 usuário", "Vagas limitadas", "Página pública"] },

    { id: "enterprise", name: "Ilimitado", price: "R$ 149,00/mês", color: "#ec4899", features: ["Candidatos ilimitados", "Usuários ilimitados", "Vagas ilimitadas", "Exportação XLS/PDF", "Kanban Board", "Suporte prioritário"], stripeUrl: "https://buy.stripe.com/test_fZu4gA2LD71p6HW9pa0VO01" },

      <div style={{ display: "flex", gap: 0, borderBottom: "1px solid var(--border)", marginBottom: 24 }}>

        <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: 14, padding: "24px 28px" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
            <div style={{ gridColumn: "1/-1" }}>
              <label style={{ display: "block", marginBottom: 6, fontSize: 13, fontWeight: 600, color: "var(--text2)" }}>Nome da Empresa *</label>
              <input value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} style={inputStyle} disabled={!canEdit} placeholder="Nome da empresa" />
            </div>
            <div>
              <label style={{ display: "block", marginBottom: 6, fontSize: 13, fontWeight: 600, color: "var(--text2)" }}>Telefone</label>
              <input value={form.phone} onChange={e => setForm(f => ({ ...f, phone: e.target.value }))} style={inputStyle} disabled={!canEdit} placeholder="(11) 99999-0000" />

            <div>
              <div style={{ fontSize: 12, color: "var(--text2)", marginBottom: 3 }}>🔗 Link público da empresa</div>

          <div style={{ marginTop: 20, padding: "16px 20px", background: "var(--card)", border: "1px solid var(--border)", borderRadius: 12, fontSize: 13, color: "var(--text2)" }}>
            💳 Pagamentos processados com segurança. Cancele a qualquer momento. Dúvidas? <span style={{ color: "var(--accent2)", cursor: "pointer", fontWeight: 600 }}>jean-lima19@hotmail.com</span>
          </div>

      )}

      {tab === "danger" && isOwner && (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div style={{ background: "rgba(239,68,68,0.05)", border: "1px solid rgba(239,68,68,0.25)", borderRadius: 14, padding: "20px 24px" }}>

          </div>

    </div>
  );
}


class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null, errorInfo: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true };
  }
  componentDidCatch(error, errorInfo) {
    this.setState({ error, errorInfo });
    console.error("ErrorBoundary caught an error", error, errorInfo);
  }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ padding: 40, color: "var(--danger, red)", background: "var(--bg, white)", minHeight: "100vh" }}>
          <h2>Oops! Algo quebrou na interface.</h2>
          <p>Tire um print dessa tela e envie para o suporte:</p>
          <pre style={{ overflow: "auto", background: "#f8d7da", padding: 10, borderRadius: 5 }}>
            {this.state.error && this.state.error.toString()}
            <br />
            {this.state.errorInfo && this.state.errorInfo.componentStack}
          </pre>
        </div>
      );
    }
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App /></ErrorBoundary>);

    </script>
</body>
</html>
